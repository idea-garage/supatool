roles:
  - admin
  - user
  - guest

models:
  m_roles:
    description: Role master
    fields:
      id:
        type: uuid
        primary: true
      name:
        type: text
        notNull: true
  user_roles:
    description: Role assignment per user
    fields:
      id:
        type: uuid
        primary: true
      user_id:
        type: uuid
        notNull: true
      role_id:
        type: uuid
        notNull: true
  user_profiles:
    description: User profile
    fields:
      id:
        type: uuid
        primary: true
        default: uuid_generate_v4()
        label: User ID
      name:
        type: text
        notNull: true
        label: Name
      created_at:
        type: timestamp
        default: now()
    relations:
      participants:
        type: hasMany
        target: participants
        foreignKey: user_profile_id
  participants:
    description: Event participants
    fields:
      id:
        type: uuid
        primary: true
        default: uuid_generate_v4()
        label: Participant ID
      user_id:
        type: uuid
        ref: user_profiles.id
        notNull: true
        label: User ID
      status:
        type: text
        enum: [pending, confirmed, cancelled]
        label: Status
    relations:
      user_profile:
        type: belongsTo
        target: user_profiles
        foreignKey: user_id

security:
  functions:
    get_user_role:
      description: Get user role
      use_template: true
      template_type: simple
  policies:
    user_profiles:
      select:
        role: [admin, user]
        use_template: true
        template_type: simple
      update:
        role: [admin]
        use_template: true
        template_type: simple
      delete:
        using: get_user_role() = 'admin'
        use_template: false
    participants:
      select:
        role: [admin, user]
        use_template: true
        template_type: simple 